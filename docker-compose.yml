version: "3.9"

# =============================================================================
# Amazon Second Life AI — Local Development Stack
# =============================================================================
# Usage:
#   docker compose up --build          # start everything
#   docker compose down -v             # stop + wipe volumes
#   docker compose up postgres redis minio   # infra only
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

networks:
  slmai:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slmai
      POSTGRES_PASSWORD: slmai_password
      POSTGRES_DB: slmai_user   # default DB; init script creates the rest
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - slmai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slmai -d slmai_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - slmai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - slmai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket init (runs once, creates slmai-media bucket)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - slmai
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/slmai-media &&
        mc anonymous set public local/slmai-media &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Backend services (Member A owns: gateway, user, passport)
  # ---------------------------------------------------------------------------

  gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - slmai
    environment:
      USER_SERVICE_URL: http://user:8001
      GRADING_SERVICE_URL: http://grading:8002
      LIFECYCLE_SERVICE_URL: http://lifecycle:8003
      PASSPORT_SERVICE_URL: http://passport:8004
      MATCHING_SERVICE_URL: http://matching:8005
      SUSTAINABILITY_SERVICE_URL: http://sustainability:8006
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/user/Dockerfile
    ports:
      - "8001:8001"
    networks:
      - slmai
    environment:
      DATABASE_URL: postgresql+asyncpg://slmai:slmai_password@postgres:5432/slmai_user
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  passport:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/passport/Dockerfile
    ports:
      - "8004:8004"
    networks:
      - slmai
    environment:
      DATABASE_URL: postgresql+asyncpg://slmai:slmai_password@postgres:5432/slmai_passport
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend services (Member B owns: grading, lifecycle, matching, sustainability)
  # ---------------------------------------------------------------------------

  grading:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/grading/Dockerfile
    ports:
      - "8002:8002"
    networks:
      - slmai
    environment:
      DATABASE_URL: postgresql+asyncpg://slmai:slmai_password@postgres:5432/slmai_grading
      REDIS_URL: redis://redis:6379/0
      AI_MODE: mock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  lifecycle:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/lifecycle/Dockerfile
    ports:
      - "8003:8003"
    networks:
      - slmai
    environment:
      DATABASE_URL: postgresql+asyncpg://slmai:slmai_password@postgres:5432/slmai_lifecycle
      REDIS_URL: redis://redis:6379/0
      AI_MODE: mock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  matching:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/matching/Dockerfile
    ports:
      - "8005:8005"
    networks:
      - slmai
    environment:
      DATABASE_URL: postgresql+asyncpg://slmai:slmai_password@postgres:5432/slmai_matching
      REDIS_URL: redis://redis:6379/0
      AI_MODE: mock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  sustainability:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/sustainability/Dockerfile
    ports:
      - "8006:8006"
    networks:
      - slmai
    environment:
      DATABASE_URL: postgresql+asyncpg://slmai:slmai_password@postgres:5432/slmai_sustainability
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
