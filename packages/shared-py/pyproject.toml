[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shared-py"
version = "0.1.0"
description = "Shared library for all Amazon Second Life AI backend services"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.115.*",
    "uvicorn[standard]==0.30.*",
    "pydantic==2.9.*",
    "pydantic-settings==2.5.*",
    "sqlalchemy==2.0.*",
    "asyncpg==0.29.*",
    "alembic==1.13.*",
    "redis==5.0.*",
    "boto3==1.35.*",
    "httpx==0.27.*",
    "python-jose[cryptography]==3.3.*",
    "passlib[bcrypt]==1.7.*",
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.*",
    "pytest-asyncio==0.24.*",
    "ruff==0.6.*",
    "black==24.*",
]

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
